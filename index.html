function normalizeText(s) {
  return (s || "")
  .replace(/\s*\n\s*/g, " ")
  .replace(/\s+/g, " ")
  .trim();
}

function mergeSubtitleCues(raw, opts = {}) {
  const minLen = opts.minLen ?? 3.0;
  const targetLen = opts.targetLen ?? 6.0;
  const maxLen = opts.maxLen ?? 8.0;

  const isSentenceEnd = (txt) => /[.!?]["')\]]*$/.test(txt);

  const out = [];
  let cur = null;

  for (const s of raw) {
    const start = Number(s.start);
    const end = Number(s.end);
    const text = normalizeText(s.text);
    const textdich = normalizeText(s.textdich || "");

    if (!Number.isFinite(start) || !Number.isFinite(end) || end <= start) continue;
    if (!text) continue;

    if (!cur) {
      cur = { start, end, text, textdich };
      continue;
    }

    if (start - cur.end > 0.5) {
      out.push(cur);
      cur = { start, end, text, textdich };
      continue;
    }

    const merged = {
      start: cur.start,
      end,
      text: `${cur.text} ${text}`.trim(),
      textdich: `${cur.textdich} ${textdich}`.trim(),
    };

    const len = merged.end - merged.start;
    const shouldFlush =
      (len >= targetLen) ||
      (len >= minLen && isSentenceEnd(merged.text)) ||
      (len >= maxLen);

    cur = merged;

    if (shouldFlush) {
      out.push(cur);
      cur = null;
    }
  }

  if (cur) out.push(cur);
  return out.filter(x => (x.end - x.start) >= 1.2);
}

function startLearning(index) {
  segIndex = Math.max(0, Math.min(index, segments.length - 1));
  stepIndex = 0;
  repsRemaining = beginnerPlan[0].reps;

  applyLearningUI();
  player.seekTo(segments[segIndex].start, true);
  player.playVideo();
  startMonitor();
}

function applyLearningUI() {
  const seg = segments[segIndex];
  const step = beginnerPlan[stepIndex];

  // Captions (your custom divs)
  currentSubtitle.innerHTML = step.captions ? seg.text : "";
  subdich.innerHTML = step.textdich ? (seg.textdich || "") : "";

  // Optional: show status somewhere you already have
  state_rep.textContent = `[ Seg ${segIndex+1}/${segments.length} • ${step.name} • reps ${repsRemaining} ]`;
}

function startMonitor() {
  if (timerId) return;

  timerId = setInterval(() => {
    const seg = segments[segIndex];
    const step = beginnerPlan[stepIndex];
    const t = player.getCurrentTime();

    if (t >= seg.end - END_EPS) {
      // End of segment
      if (step.name === "SHADOW" && step.shadowPause > 0) {
        player.pauseVideo();
        stopMonitor();

        // Show prompt to speak (use any element you like)
        // tbao_pde.textContent = "Speak now…";

        setTimeout(() => {
          advanceLearningAfterPlay();
        }, step.shadowPause);

        return;
      }

      advanceLearningAfterPlay();
    }
  }, POLL_MS);
}

function stopMonitor() {
  if (timerId) {
    clearInterval(timerId);
    timerId = null;
  }
}

function advanceLearningAfterPlay() {
  repsRemaining--;

  if (repsRemaining > 0) {
    applyLearningUI();
    player.seekTo(segments[segIndex].start, true);
    player.playVideo();
    startMonitor();
    return;
  }

  stepIndex++;

  // auto-skip MEANING if no textdich exists
  if (stepIndex < beginnerPlan.length && beginnerPlan[stepIndex].name === "MEANING") {
    const hasTranslation = !!(segments[segIndex].textdich && segments[segIndex].textdich.trim());
    if (!hasTranslation) stepIndex++;
  }

  if (stepIndex < beginnerPlan.length) {
    repsRemaining = beginnerPlan[stepIndex].reps;
    applyLearningUI();
    player.seekTo(segments[segIndex].start, true);
    player.playVideo();
    startMonitor();
    return;
  }

  // Next segment
  if (segIndex < segments.length - 1) {
    segIndex++;
    stepIndex = 0;
    repsRemaining = beginnerPlan[0].reps;
    applyLearningUI();
    player.seekTo(segments[segIndex].start, true);
    player.playVideo();
    startMonitor();
  } else {
    // Done
    player.pauseVideo();
    stopMonitor();
    // tbao_pde.textContent = "Finished learning session.";
  }
}

function setLearningEnabled(isOn) {
  learningEnabled = !!isOn;

  // Always stop BOTH controllers first (prevents them fighting)
  stopMonitor(); // learning interval
  stopReading(); // your speech reading
  // If you have a stopSync() function, call it here too.
  // stopSync?.();

  if (learningEnabled) {
    // Switch to Learning mode

    if (segments && segments.length > 0) {
      // Keep current time and jump to nearest segment (optional)
      const t = player.getCurrentTime?.() ?? 0;
      segIndex = findNearestSegmentIndex(t, segments);

      startLearning(segIndex);

    } else {
      // No segments loaded -> fallback
      player.playVideo();
      startSync();
    }
  } else {
    // Switch to Normal mode
    // Clear your custom caption UI if you want:
    // currentSubtitle.innerHTML = "";
    // subdich.innerHTML = "";

    player.playVideo();

    // IMPORTANT: startSync/resumeSync won't auto-trigger unless statechange fires,
    // so call startSync explicitly.
    startSync();
  }
}

// Find the segment that contains current time, else nearest previous
function findNearestSegmentIndex(t, segs) {
  for (let i = 0; i < segs.length; i++) {
  if (t >= segs[i].start && t < segs[i].end) return i;
  }
  // otherwise pick the last segment whose start <= t
  let idx = 0;
  for (let i = 0; i < segs.length; i++) {
  if (segs[i].start <= t) idx = i;
  else break;
  }
  return idx;
}
