    function onYouTubeIframeAPIReady() {
      player = new YT.Player("playerContainer", {
        height: "315",
        width: "560",
        videoId: `${videoId}`,
        playerVars: { autoplay: 1, controls: 1 },
        events: {

          onReady: () => { },
          onStateChange: (e) => {
            // Your original subtitle-sync behavior
            if (e.data === YT.PlayerState.PAUSED) stopReading();
            if (e.data === YT.PlayerState.PLAYING) resumeSync();
            if (e.data === YT.PlayerState.ENDED) {
              replayCount++;
              if (replayCount < maxReplay) {
                player.seekTo(0);   // tua về đầu
                player.playVideo(); // phát lại
              }
            }
          }
        }
    });
  }

    window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;

      // ==========================

      playBtn.addEventListener("click", async () => {

// Save current time
let i_an_hien_pd_goc = 0;
function an_hien_pd_goc() {
  i_an_hien_pd_goc++;
  if (i_an_hien_pd_goc % 2 === 1) {
    currentSubtitle.style.color = "transparent"; // Ẩn phụ đề gốc
    sourceCap.style.color = "black";
  }else{
    currentSubtitle.style.color = "rgb(231, 225, 225)"; // Hiển thị phụ đề gốc
    sourceCap.style.color = "rgb(231, 225, 225)";
  }  
}

// Repeat last marked time
let i_an_hien_pd_dich = 0;
function an_hien_pd_dich() {
  i_an_hien_pd_dich++;
  if (i_an_hien_pd_dich % 2 === 1) {
    subdich.style.color = "transparent"; // Ẩn phụ đề dịch 
    transCap.style.color = "black";
  } else {
    subdich.style.color = "rgb(231, 225, 225)"; // Hiển thị phụ đề dịch
    transCap.style.color = "rgb(231, 225, 225)";
  }
}

hthispeed.addEventListener("click", function() {
  index_speed = (index_speed + 1) % list_speed.length;
  sp = list_speed[index_speed];
  player.setPlaybackRate(sp);
  if (index_speed === 3||index_speed === 7) {
    hthispeed.textContent = sp.toFixed(0);
  } else {
    hthispeed.textContent = sp.toFixed(2);
  }
});
hthireplay.addEventListener("click", function() {
  maxReplay = parseInt(hthireplay.textContent);
  maxReplay = (maxReplay + 1)%6; 
  if (maxReplay === 0){
    maxReplay = 1;
  } 
  hthireplay.textContent = maxReplay;
});
